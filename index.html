<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>JUST.. ONE.. MORE...!!!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hud">
        <div class="brand">
          <h1>JUST.. ONE.. MORE...!!!</h1>
          <p>Tap nodes to charge the network</p>
        </div>
        <div class="stats">
          <div class="pill">
            <span class="label">Energy</span>
            <strong id="energyValue">0</strong>
          </div>
          <div class="pill">
            <span class="label">Level</span>
            <strong id="levelValue">1</strong>
          </div>
          <div class="pill">
            <span class="label">Best</span>
            <strong id="bestValue">0</strong>
          </div>
        </div>
        <div class="scoreboard">
          <div class="scoreboard-title">Top scores</div>
          <div id="scoresList" class="scores-list"></div>
        </div>
      </section>

      <section class="canvas-panel">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-card">
            <h2 id="overlayTitle">Level complete</h2>
            <p id="overlayText">You cleared the level.</p>
            <div class="overlay-actions">
              <button id="restartButton">Restart</button>
              <button id="nextButton">Next level</button>
            </div>
          </div>
        </div>
        <div id="hintOverlay" class="overlay hidden">
          <div class="overlay-card hint-card">
            <h2>How to play</h2>
            <div id="hintContent" class="hint-content"></div>
            <div class="overlay-actions">
              <button id="closeHintButton">Close</button>
            </div>
          </div>
        </div>
      </section>

      <section class="footer-bar">
        <div id="statusText">Tap any glowing node to feed it energy.</div>
        <button id="hintButton">Hint</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
